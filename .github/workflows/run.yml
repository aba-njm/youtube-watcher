name: YouTube Auto Downloader

on:
  schedule:
    - cron: '*/15 * * * *' # تشغيل كل 15 دقيقة تلقائياً
  workflow_dispatch: # يتيح لك تشغيله يدوياً كأداة للتجربة

permissions:
  contents: write
  
concurrency:
  group: "bot-runner"
  cancel-in-progress: false
  
jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
    - name: جلب ملفات الكود
      uses: actions/checkout@v4

    - name: تثبيت بايثون
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: تثبيت المكتبات
      run: pip install -r requirements.txt

    - name: تشغيل السكربت المراقب
      env:
        API_ID: ${{ secrets.API_ID }}
        API_HASH: ${{ secrets.API_HASH }}
        TELEGRAM_SESSION: ${{ secrets.TELEGRAM_SESSION }}
        YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }} # 🔑 تم إضافة السطر هنا لتمرير المفتاح بأمان لبايثون
      run: python watcher.py

    - name: Save and Commit History
      run: |
        git config --local user.email "actions@github.com"
        git config --local user.name "GitHub Actions"
        git add history.txt
        git commit -m "🤖 تحديث سجل الفيديوهات المحملة تلقائياً [skip ci]" || echo "لا توجد تغييرات للحفظ"
        git push
