name: YouTube Auto Downloader

on:
  schedule:
    - cron: '*/15 * * * *' # تشغيل كل 15 دقيقة تلقائياً
  workflow_dispatch: # يتيح لك تشغيله يدوياً كأداة للتجربة

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
    - name: جلب ملفات الكود
      uses: actions/checkout@v4

    - name: تثبيت بايثون
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: تثبيت المكتبات
      run: pip install -r requirements.txt

    - name: تشغيل السكربت المراقب
      env:
        API_ID: ${{ secrets.API_ID }}
        API_HASH: ${{ secrets.API_HASH }}
        TELEGRAM_SESSION: ${{ secrets.TELEGRAM_SESSION }}
      run: python watcher.py

